version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit-local
      POSTGRES_DB: conduit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql

  arangodb:
    image: arangodb:3.11
    environment:
      ARANGO_ROOT_PASSWORD: conduit-local
    ports:
      - "8529:8529"
    volumes:
      - arango_data:/var/lib/arangodb3

volumes:
  postgres_data:
  arango_data:
